<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سين جيم 🔥</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
text-align:center;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
flex-wrap:wrap;
}

.score{
font-size:18px;
margin:5px;
}

.turn{
font-weight:bold;
color:#f97316;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.category{
background:#1e293b;
padding:10px;
border-radius:15px;
}

.category h3{
margin-bottom:10px;
}

.points button{
width:80%;
margin:8px;
padding:12px;
font-size:18px;
background:#f97316;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.points button:disabled{
background:#374151;
cursor:not-allowed;
}

.questionBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e6;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.timer{
font-size:18px;
margin-bottom:10px;
}

.questionText{
font-size:22px;
margin:15px;
max-width:600px;
}

input{
padding:10px;
width:250px;
border-radius:10px;
border:none;
text-align:center;
margin:10px;
}

button.action{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
cursor:pointer;
}

.result{
margin-top:10px;
font-size:18px;
}

@media(max-width:768px){
.board{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header>
<div class="score">الفريق 1: <span id="score1">0</span></div>
<h2>🔥 سين جيم</h2>
<div class="score">الفريق 2: <span id="score2">0</span></div>
<div class="turn">الدور الحالي: <span id="currentTeam">1</span></div>
</header>

<div class="board">

<div class="category">
<h3>📺 مسلسلات</h3>
<div class="points">
<button onclick="openQuestion(this,'series',200)">200</button>
<button onclick="openQuestion(this,'series',400)">400</button>
<button onclick="openQuestion(this,'series',600)">600</button>
</div>
</div>

<div class="category">
<h3>🇸🇦 السعودية</h3>
<div class="points">
<button onclick="openQuestion(this,'saudi',200)">200</button>
<button onclick="openQuestion(this,'saudi',400)">400</button>
<button onclick="openQuestion(this,'saudi',600)">600</button>
</div>
</div>

<div class="category">
<h3>🌍 عامة</h3>
<div class="points">
<button onclick="openQuestion(this,'general',200)">200</button>
<button onclick="openQuestion(this,'general',400)">400</button>
<button onclick="openQuestion(this,'general',600)">600</button>
</div>
</div>

</div>

<div class="questionBox" id="questionBox">
<div class="timer">الوقت: <span id="timer">0</span> ثانية</div>
<div class="questionText" id="questionText"></div>

<input type="text" id="userAnswer" placeholder="اكتب الإجابة هنا">

<button class="action" onclick="checkAnswer()">تحقق من الإجابة</button>
<div class="result" id="answerResult"></div>
<button class="action" onclick="closeQuestion()">رجوع</button>
</div>

<script>

let currentPoints = 0;
let currentTeam = 1;
let timerInterval;
let time = 0;
let currentButton = null;

const questions = {

series:{
200:{q:"من هو بطل مسلسل Game Of Thrones؟",a:"jon snow"},
400:{q:"في أي سنة صدر مسلسل Breaking Bad؟",a:"2008"},
600:{q:"ما اسم المدينة الرئيسية في مسلسل Vikings؟",a:"kattegat"}
},

saudi:{
200:{q:"ما هي عاصمة المملكة العربية السعودية؟",a:"الرياض"},
400:{q:"في أي عام تم توحيد المملكة العربية السعودية؟",a:"1932"},
600:{q:"من هو مؤسس الدولة السعودية الأولى؟",a:"محمد بن سعود"}
},

general:{
200:{q:"كم عدد قارات العالم؟",a:"7"},
400:{q:"ما هو أكبر محيط في العالم؟",a:"المحيط الهادئ"},
600:{q:"من اخترع المصباح الكهربائي؟",a:"توماس اديسون"}
}

};

function openQuestion(button,category,points){

currentButton = button;
currentPoints = points;

let data = questions[category][points];

window.correctAnswer = data.a.toLowerCase();

document.getElementById("questionText").innerText = data.q;
document.getElementById("answerResult").innerText = "";
document.getElementById("userAnswer").value = "";

document.getElementById("questionBox").style.display="flex";

time=0;
document.getElementById("timer").innerText=time;

timerInterval=setInterval(()=>{
time++;
document.getElementById("timer").innerText=time;
},1000);
}

function checkAnswer(){

let userInput = document.getElementById("userAnswer").value.trim().toLowerCase();

if(userInput === window.correctAnswer){

document.getElementById("answerResult").innerHTML =
"✅ إجابة صحيحة<br>الإجابة: "+window.correctAnswer;

if(currentTeam===1){
document.getElementById("score1").innerText=
parseInt(document.getElementById("score1").innerText)+currentPoints;
currentTeam=2;
}else{
document.getElementById("score2").innerText=
parseInt(document.getElementById("score2").innerText)+currentPoints;
currentTeam=1;
}

document.getElementById("currentTeam").innerText=currentTeam;

}else{

document.getElementById("answerResult").innerHTML =
"❌ إجابة خاطئة<br>الإجابة الصحيحة: "+window.correctAnswer;

currentTeam = currentTeam===1?2:1;
document.getElementById("currentTeam").innerText=currentTeam;
}

clearInterval(timerInterval);

if(currentButton){
currentButton.disabled = true;
}

}

function closeQuestion(){
clearInterval(timerInterval);
document.getElementById("questionBox").style.display="none";
}

</script>

</body>
</html>
