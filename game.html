<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سين جيم 🔥</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Tahoma';
background:#0f172a;
color:white;
text-align:center;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
padding:15px;
background:#111827;
}

.scoreBox{
margin:5px;
}

.score{
font-size:20px;
font-weight:bold;
}

.controls button{
margin:3px;
padding:5px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.plus{background:#22c55e;color:white}
.minus{background:#ef4444;color:white}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.category{
background:#1e293b;
padding:10px;
border-radius:15px;
}

.points button{
width:80%;
margin:8px;
padding:12px;
font-size:18px;
background:#f97316;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.points button:disabled{
background:#374151;
cursor:not-allowed;
}

.questionBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e6;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.timer{
margin-bottom:10px;
}

input{
padding:10px;
width:250px;
border-radius:10px;
border:none;
text-align:center;
margin:10px;
}

button.action{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#f97316;
color:white;
cursor:pointer;
}

.result{
margin-top:10px;
}

.helpers{
margin-top:15px;
}

.helpers button{
margin:5px;
padding:6px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
}

.helpers button:disabled{
background:#374151;
}

@media(max-width:768px){
.board{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header>

<div class="scoreBox">
الفريق 1
<div class="score" id="score1">0</div>
<div class="controls">
<button class="plus" onclick="manualAdd(1)">+</button>
<button class="minus" onclick="manualMinus(1)">-</button>
</div>
<div>مساعدات: <span id="help1">3</span></div>
</div>

<h2>🔥 سين جيم</h2>

<div class="scoreBox">
الفريق 2
<div class="score" id="score2">0</div>
<div class="controls">
<button class="plus" onclick="manualAdd(2)">+</button>
<button class="minus" onclick="manualMinus(2)">-</button>
</div>
<div>مساعدات: <span id="help2">3</span></div>
</div>

</header>

<div class="board">

<div class="category">
<h3>📺 مسلسلات</h3>
<div class="points">
<button onclick="openQuestion(this,'series',200)">200</button>
<button onclick="openQuestion(this,'series',400)">400</button>
<button onclick="openQuestion(this,'series',600)">600</button>
</div>
</div>

<div class="category">
<h3>🇸🇦 السعودية</h3>
<div class="points">
<button onclick="openQuestion(this,'saudi',200)">200</button>
<button onclick="openQuestion(this,'saudi',400)">400</button>
<button onclick="openQuestion(this,'saudi',600)">600</button>
</div>
</div>

<div class="category">
<h3>🌍 عامة</h3>
<div class="points">
<button onclick="openQuestion(this,'general',200)">200</button>
<button onclick="openQuestion(this,'general',400)">400</button>
<button onclick="openQuestion(this,'general',600)">600</button>
</div>
</div>

</div>

<div class="questionBox" id="questionBox">

<div class="timer">الوقت: <span id="timer">0</span> ثانية</div>

<h3 id="questionText"></h3>

<input type="text" id="userAnswer" placeholder="اكتب الإجابة هنا">

<button class="action" onclick="checkAnswer()">تحقق</button>
<div class="result" id="answerResult"></div>

<div class="helpers">
<button onclick="useDouble()">مضاعفة النقاط</button>
<button onclick="skipQuestion()">تخطي</button>
<button onclick="showHint()">تلميح</button>
</div>

<button class="action" onclick="closeQuestion()">رجوع</button>

</div>

<script>

let currentPoints=0;
let currentTeam=1;
let timerInterval;
let time=0;
let currentButton=null;
let doubleActive=false;

let helpers={
1:3,
2:3
};

const questions={
series:{
200:{q:"من هو بطل مسلسل Game Of Thrones؟",a:"jon snow"},
400:{q:"في أي سنة صدر مسلسل Breaking Bad؟",a:"2008"},
600:{q:"ما اسم المدينة الرئيسية في مسلسل Vikings؟",a:"kattegat"}
},
saudi:{
200:{q:"ما هي عاصمة السعودية؟",a:"الرياض"},
400:{q:"في أي عام تم توحيد المملكة؟",a:"1932"},
600:{q:"من مؤسس الدولة السعودية الأولى؟",a:"محمد بن سعود"}
},
general:{
200:{q:"كم عدد قارات العالم؟",a:"7"},
400:{q:"ما أكبر محيط في العالم؟",a:"المحيط الهادئ"},
600:{q:"من اخترع المصباح؟",a:"توماس اديسون"}
}
};

function openQuestion(btn,cat,pts){
currentButton=btn;
currentPoints=pts;
doubleActive=false;

let data=questions[cat][pts];
window.correctAnswer=data.a.toLowerCase();

document.getElementById("questionText").innerText=data.q;
document.getElementById("answerResult").innerText="";
document.getElementById("userAnswer").value="";
document.getElementById("questionBox").style.display="flex";

time=0;
document.getElementById("timer").innerText=time;
timerInterval=setInterval(()=>{time++;document.getElementById("timer").innerText=time;},1000);
}

function checkAnswer(){
let input=document.getElementById("userAnswer").value.trim().toLowerCase();
let pts=doubleActive?currentPoints*2:currentPoints;

if(input===window.correctAnswer){
document.getElementById("answerResult").innerHTML="✅ صحيح";
addScore(currentTeam,pts);
}else{
document.getElementById("answerResult").innerHTML="❌ خطأ<br>الإجابة: "+window.correctAnswer;
}

switchTeam();
disableButton();
clearInterval(timerInterval);
}

function addScore(team,pts){
let el=document.getElementById("score"+team);
el.innerText=parseInt(el.innerText)+pts;
}

function manualAdd(team){
addScore(team,100);
}

function manualMinus(team){
addScore(team,-100);
}

function switchTeam(){
currentTeam=currentTeam===1?2:1;
}

function disableButton(){
if(currentButton){
currentButton.disabled=true;
}
}

function closeQuestion(){
clearInterval(timerInterval);
document.getElementById("questionBox").style.display="none";
}

function useDouble(){
if(helpers[currentTeam]>0){
doubleActive=true;
helpers[currentTeam]--;
document.getElementById("help"+currentTeam).innerText=helpers[currentTeam];
}
}

function skipQuestion(){
if(helpers[currentTeam]>0){
helpers[currentTeam]--;
document.getElementById("help"+currentTeam).innerText=helpers[currentTeam];
closeQuestion();
disableButton();
}
}

function showHint(){
if(helpers[currentTeam]>0){
helpers[currentTeam]--;
document.getElementById("help"+currentTeam).innerText=helpers[currentTeam];
alert("أول حرف: "+window.correctAnswer.charAt(0).toUpperCase());
}
}

</script>

</body>
</html>
