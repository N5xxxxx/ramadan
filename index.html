<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رمضان كريم 🌙</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
text-align:center;
overflow-x:hidden;
}

/* فيديو الخلفية */
#bgVideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-2;
opacity:0.25;
}

/* طبقة تغميق */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom,#0f172a,rgba(0,0,0,0.9));
z-index:-1;
}

/* هلال نازل */
.moon{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
font-size:70px;
animation:dropMoon 3s ease forwards;
}

@keyframes dropMoon{
0%{top:-100px;}
100%{top:20px;}
}

h1{
margin-top:100px;
font-size:40px;
}

.subtitle{
opacity:0.8;
margin-top:-15px;
margin-bottom:40px;
}

.grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card{
width:280px;
height:380px;
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:20px;
transition:0.4s;
box-shadow:0 0 20px rgba(255,215,0,0.2);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card .overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.card h2{
position:absolute;
bottom:20px;
width:100%;
z-index:2;
}

.section{
display:none;
min-height:100vh;
padding:120px 20px;
background-size:cover;
background-position:center;
position:relative;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.section::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.section .content{
position:relative;
z-index:2;
max-width:800px;
margin:auto;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:gold;
color:black;
cursor:pointer;
}

.sound-btn{
position:fixed;
top:20px;
left:20px;
background:gold;
color:black;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="moon">🌙</div>

<audio id="mainAudio" loop>
<source src="ramadan.mp3" type="audio/mpeg">
</audio>

<button class="sound-btn" onclick="toggleSound()">🔊 تشغيل</button>

<h1>رمضان كريم</h1>
<p class="subtitle">عملاً صالحاً متقبلاً إن شاء الله 🤲</p>

<div class="grid">

<div class="card" onclick="openSection('advice','https://i.pinimg.com/736x/91/55/1c/91551c89081cd8dbb0dc7ddb84e57617.jpg')">
<img src="https://i.pinimg.com/736x/91/55/1c/91551c89081cd8dbb0dc7ddb84e57617.jpg">
<div class="overlay"></div>
<h2>نصائح رمضانية 🤲</h2>
</div>

<div class="card" onclick="openSection('poetry','https://i.pinimg.com/736x/ae/5e/8f/ae5e8fc8ce08f9192a19ccb59fa28319.jpg')">
<img src="https://i.pinimg.com/736x/ae/5e/8f/ae5e8fc8ce08f9192a19ccb59fa28319.jpg">
<div class="overlay"></div>
<h2>شعر رمضاني 🕌</h2>
</div>

<div class="card" onclick="openSection('quiz','https://i.pinimg.com/736x/68/fa/ca/68faca965da4d51d53ec5db537a174dd.jpg')">
<img src="https://i.pinimg.com/736x/68/fa/ca/68faca965da4d51d53ec5db537a174dd.jpg">
<div class="overlay"></div>
<h2>أسئلة رمضانية ❓</h2>
</div>

</div>

<!-- نصائح -->
<div id="advice" class="section">
<div class="content">
<h2>نصيحة اليوم 🤲</h2>
<p id="randomAdvice"></p>
<button onclick="newAdvice()">نصيحة أخرى</button>
<br>
<button onclick="goBack()">رجوع</button>
</div>
</div>

<!-- شعر -->
<div id="poetry" class="section">
<div class="content">
<h2>شعر رمضاني</h2>
<p>
رمضان أقبل يا أولي الألبابِ  
فاستقبلوه بعد طول غيابِ  
شهر الصيام و شهر القيام  
شهر التلاوة والكتابِ
</p>
<button onclick="goBack()">رجوع</button>
</div>
</div>

<!-- أسئلة -->
<div id="quiz" class="section">
<div class="content">
<h2>سؤال رمضاني</h2>
<p id="question"></p>
<button onclick="answer(true)">صح</button>
<button onclick="answer(false)">خطأ</button>
<p id="result"></p>
<button onclick="newQuestion()">سؤال آخر</button>
<br>
<button onclick="goBack()">رجوع</button>
</div>
</div>

<script>

let audio = document.getElementById("mainAudio");

function toggleSound(){
if(audio.paused){audio.play();}
else{audio.pause();}
}

function openSection(id,image){
document.querySelector('.grid').style.display='none';
let section=document.getElementById(id);
section.style.display='block';
section.style.backgroundImage="url('"+image+"')";
if(id==="advice") newAdvice();
if(id==="quiz") newQuestion();
}

function goBack(){
document.querySelectorAll('.section').forEach(sec=>sec.style.display='none');
document.querySelector('.grid').style.display='flex';
}

const advices=[
"أخلص نيتك لله في كل عمل.",
"الدعاء عند الإفطار مستجاب بإذن الله.",
"أكثر من قراءة القرآن في رمضان.",
"احفظ لسانك عن الغيبة.",
"الصدقة في رمضان عظيمة الأجر.",
"لا تجعل همك الطعام فقط بل القبول.",
"قم الليل ولو بركعتين.",
"أصلح قلبك قبل أن تصلح غيرك."
];

function newAdvice(){
document.getElementById("randomAdvice").innerText=
advices[Math.floor(Math.random()*advices.length)];
}

const questions=[
{q:"الغيبة لا تؤثر على الصيام.",a:false},
{q:"السحور سنة وفيه بركة.",a:true},
{q:"من أفطر ناسياً فصيامه باطل.",a:false},
{q:"ليلة القدر في رمضان.",a:true}
];

function newQuestion(){
let random=questions[Math.floor(Math.random()*questions.length)];
window.currentAnswer=random.a;
document.getElementById("question").innerText=random.q;
document.getElementById("result").innerText="";
}

function answer(choice){
if(choice===window.currentAnswer){
document.getElementById("result").innerText="إجابة صحيحة ✅";
}else{
document.getElementById("result").innerText="إجابة خاطئة ❌";
}
}

</script>

</body>
</html>
