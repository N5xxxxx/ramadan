<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ramadan 🌙</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin:40px 0;
}

/* شبكة الصور */
.grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

/* الكرت */
.card{
width:300px;
height:400px;
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:20px;
transition:0.4s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card .overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.card h2{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
z-index:2;
font-size:22px;
}

/* القسم المفتوح */
.section{
display:none;
min-height:100vh;
padding:100px 20px;
background-size:cover;
background-position:center;
position:relative;
}

.section::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.section .content{
position:relative;
z-index:2;
}

.back{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#22c55e;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>رمضان كريم 🌙</h1>

<div class="grid">

<div class="card" onclick="openSection('one','https://i.pinimg.com/736x/91/55/1c/91551c89081cd8dbb0dc7ddb84e57617.jpg')">
<img src="https://i.pinimg.com/736x/91/55/1c/91551c89081cd8dbb0dc7ddb84e57617.jpg">
<div class="overlay"></div>
<h2>يا مطوع 😉</h2>
</div>

<div class="card" onclick="openSection('two','https://i.pinimg.com/736x/ae/5e/8f/ae5e8fc8ce08f9192a19ccb59fa28319.jpg')">
<img src="https://i.pinimg.com/736x/ae/5e/8f/ae5e8fc8ce08f9192a19ccb59fa28319.jpg">
<div class="overlay"></div>
<h2>يا زويحف</h2>
</div>

<div class="card" onclick="openSection('three','https://i.pinimg.com/736x/68/fa/ca/68faca965da4d51d53ec5db537a174dd.jpg')">
<img src="https://i.pinimg.com/736x/68/fa/ca/68faca965da4d51d53ec5db537a174dd.jpg">
<div class="overlay"></div>
<h2>تعال تعال</h2>
</div>

</div>

<div id="one" class="section">
<div class="content">
<h2>جزاك الله خير 🤲</h2>
<p>الله يتوب علينا وعليك</p>
<button class="back" onclick="goBack()">رجوع</button>
</div>
</div>

<div id="two" class="section">
<div class="content">
<h2>جزاك الله خير</h2>
<p>ربي يكتب أجرك</p>
<button class="back" onclick="goBack()">رجوع</button>
</div>
</div>

<div id="three" class="section">
<div class="content">
<h2>قل صح ✅</h2>
<p>تكفى قل صح</p>
<button class="back" onclick="goBack()">رجوع</button>
</div>
</div>

<script>

function openSection(id,image){
document.querySelector('.grid').style.display='none';
let section = document.getElementById(id);
section.style.display='block';
section.style.backgroundImage = "url('"+image+"')";
}

function goBack(){
document.querySelectorAll('.section').forEach(sec=>{
sec.style.display='none';
});
document.querySelector('.grid').style.display='flex';
}

</script>

</body>
</html>
