<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ramadan 🌙</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

h1{margin-top:40px;}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:20px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
}

.section{
display:none;
padding:60px;
min-height:60vh;
background-size:cover;
background-position:center;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.content{
position:relative;
z-index:2;
}

.moon{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
font-size:60px;
animation:dropMoon 4s ease forwards;
}

@keyframes dropMoon{
0%{top:-100px;}
100%{top:20px;}
}
</style>
</head>

<body>

<h1>Ramadan 🌙</h1>

<button onclick="openSection('repent')">Repent – Allah Forgives</button>
<button onclick="openSection('jazak')">Jazak Allah Khair</button>
<button onclick="openSection('say')">Say It Right</button>

<div id="repent" class="section">
<div class="overlay"></div>
<div class="content">
<h2>May Allah Forgive You 🤍</h2>
<p>Allah loves those who repent.</p>
</div>
</div>

<div id="jazak" class="section">
<div class="overlay"></div>
<div class="content">
<h2>Jazak Allah Khair 🤲</h2>
<p>May Allah reward you with goodness.</p>
</div>
</div>

<div id="say" class="section">
<div class="overlay"></div>
<div class="content">
<h2>Say It Right ✅</h2>
<p>Speak good or remain silent.</p>
</div>
</div>

<div class="moon">🌙</div>

</body>
</html>
