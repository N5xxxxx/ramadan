<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمضان كريم 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0b1320;
color:white;
text-align:center;
overflow-x:hidden;
}

/* فيديو الخلفية */
#bgVideo{
position:fixed;
top:0;left:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-3;
opacity:.28;
}

/* طبقة تدرج */
body::after{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(to bottom,#0b1320 10%,rgba(0,0,0,.9));
z-index:-2;
}

/* نجوم خفيفة */
.stars{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:.18;
z-index:-1;
}

/* هلال */
.moon{
position:fixed;
top:-120px;
left:50%;
transform:translateX(-50%);
font-size:80px;
animation:dropMoon 3s ease forwards;
}
@keyframes dropMoon{
0%{top:-120px}
100%{top:20px}
}

/* العنوان */
h1{
margin-top:120px;
font-size:48px;
font-weight:900;
color:gold;
text-shadow:0 0 25px rgba(255,215,0,.6);
animation:fadeIn 2s ease;
}
.subtitle{
opacity:.9;
margin-top:-15px;
margin-bottom:40px;
font-size:18px;
}

/* شبكة الأقسام */
.grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding-bottom:80px;
}

.card{
width:300px;
height:400px;
border-radius:20px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:.4s;
box-shadow:0 0 25px rgba(255,215,0,.3);
}
.card:hover{transform:translateY(-10px) scale(1.05)}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card::after{
content:"";
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.card h2{
position:absolute;
bottom:20px;
width:100%;
z-index:2;
font-size:22px;
}

/* الأقسام */
.section{
display:none;
min-height:100vh;
padding:120px 20px;
background-size:cover;
background-position:center;
position:relative;
animation:fadeIn 1s ease;
}
.section::before{
content:"";
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.75);
}
.section .content{
position:relative;
z-index:2;
max-width:800px;
margin:auto;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:gold;
color:black;
cursor:pointer;
font-weight:bold;
}

.sound-btn{
position:fixed;
top:20px;
left:20px;
background:gold;
color:black;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="stars"></div>
<div class="moon">🌙</div>

<audio id="mainAudio" loop>
<source src="ramadan.mp3" type="audio/mpeg">
</audio>

<button class="sound-btn" onclick="toggleSound()">🔊 تشغيل</button>

<h1>رمضان كريم</h1>
<p class="subtitle">عملاً صالحاً متقبلاً إن شاء الله 🤲</p>

<div class="grid">

<div class="card" onclick="openSection('advice','https://i.pinimg.com/736x/91/55/1c/91551c89081cd8dbb0dc7ddb84e57617.jpg')">
<img src="https://i.pinimg.com/736x/91/55/1c/91551c89081cd8dbb0dc7ddb84e57617.jpg">
<h2>نصائح رمضانية 🤲</h2>
</div>

<div class="card" onclick="openSection('poetry','https://i.pinimg.com/736x/ae/5e/8f/ae5e8fc8ce08f9192a19ccb59fa28319.jpg')">
<img src="https://i.pinimg.com/736x/ae/5e/8f/ae5e8fc8ce08f9192a19ccb59fa28319.jpg">
<h2>شعر رمضاني 🕌</h2>
</div>

<div class="card" onclick="openSection('quiz','https://i.pinimg.com/736x/68/fa/ca/68faca965da4d51d53ec5db537a174dd.jpg')">
<img src="https://i.pinimg.com/736x/68/fa/ca/68faca965da4d51d53ec5db537a174dd.jpg">
<h2>أسئلة رمضانية ❓</h2>
</div>

</div>

<!-- نصائح -->
<div id="advice" class="section">
<div class="content">
<h2>نصيحة رمضانية 🤲</h2>
<p id="randomAdvice"></p>
<button onclick="newAdvice()">نصيحة أخرى</button><br>
<button onclick="goBack()">رجوع</button>
</div>
</div>

<!-- شعر -->
<div id="poetry" class="section">
<div class="content">
<h2>قصيدة رمضانية 🕌</h2>
<p id="poemBox" style="line-height:2"></p>
<button onclick="newPoem()">قصيدة أخرى</button><br>
<button onclick="goBack()">رجوع</button>
</div>
</div>

<!-- أسئلة -->
<div id="quiz" class="section">
<div class="content">
<h2>سؤال رمضاني ❓</h2>
<p id="question"></p>
<button onclick="answer(true)">صح</button>
<button onclick="answer(false)">خطأ</button>
<p id="result"></p>
<button onclick="newQuestion()">سؤال آخر</button><br>
<button onclick="goBack()">رجوع</button>
</div>
</div>

<script>
let audio=document.getElementById("mainAudio");
function toggleSound(){audio.paused?audio.play():audio.pause();}

function openSection(id,image){
document.querySelector('.grid').style.display='none';
let s=document.getElementById(id);
s.style.display='block';
s.style.backgroundImage="url('"+image+"')";
if(id==="advice")newAdvice();
if(id==="poetry")newPoem();
if(id==="quiz")newQuestion();
}
function goBack(){
document.querySelectorAll('.section').forEach(sec=>sec.style.display='none');
document.querySelector('.grid').style.display='flex';
}

/* 20 نصيحة */
const advices=[
"أخلص نيتك لله في كل عمل.",
"الدعاء عند الإفطار مستجاب بإذن الله.",
"أكثر من قراءة القرآن يومياً.",
"احفظ لسانك عن الغيبة والنميمة.",
"الصدقة في رمضان مضاعفة الأجر.",
"قم الليل ولو بركعتين.",
"أكثر من الاستغفار في السحر.",
"لا تضيع وقتك فيما لا ينفع.",
"أصلح قلبك قبل أن تنشغل بغيرك.",
"اجعل لك ورداً ثابتاً من القرآن.",
"بر الوالدين من أعظم أسباب القبول.",
"لا تجعل همك الطعام فقط بل القبول.",
"أكثر من قول: اللهم إنك عفو تحب العفو فاعفُ عني.",
"أطعم محتاجاً ولو بالقليل.",
"نم مبكراً لتدرك الفجر.",
"أحسن الظن بالله دائماً.",
"تجنب الغضب وأنت صائم.",
"احرص على صلاة التراويح.",
"حاسب نفسك قبل أن تُحاسب.",
"تذكر أن رمضان قد لا يتكرر."
];
function newAdvice(){
document.getElementById("randomAdvice").innerText=
advices[Math.floor(Math.random()*advices.length)];
}

/* 20 شعر */
const poems=[
`رمضان أقبل يا أولي الألبابِ  
فاستقبلوه بعد طول غيابِ`,
`أتاك شهر الخير بالبشرى  
فأكرم به من زائر يُهدى`,
`يا شهر رمضان مهلاً  
فالقلوب بك تأنس`,
`إذا ما خلوت الدهر يوماً فلا تقل  
خلوت ولكن قل عليّ رقيب`,
`شهر الصيام أتى بالخير مبتسماً`,
`رمضان يا شهر الرحمة والغفران`,
`أقبلت يا رمضان بالأنوار`,
`يا صائماً لله محتسباً`,
`في رمضان تسمو الأرواح`,
`يا نفس توبي فإن الموت قد حانا`,
`قم في الدجى وناجِ ربك خاشعاً`,
`شهر القيام وشهر الدعاء`,
`رمضان مدرسة التقوى`,
`يا باغي الخير أقبل`,
`صم عن الحرام كما تصوم عن الطعام`,
`في الصوم سرٌ لا يراه سوى الإله`,
`رمضان نورٌ في القلوب إذا أتى`,
`يا شهر خيرٍ أقبلت بالبِرِّ`,
`إذا جاء رمضان فافتح قلبك قبل بابك`,
`لي في رمضان دعوة لا تخيب`
];
function newPoem(){
document.getElementById("poemBox").innerText=
poems[Math.floor(Math.random()*poems.length)];
}

/* 20 سؤال */
const questions=[
{q:"السحور سنة وفيه بركة.",a:true},
{q:"من أفطر ناسياً فعليه قضاء.",a:false},
{q:"الغيبة لا تنقص أجر الصيام.",a:false},
{q:"ليلة القدر في رمضان.",a:true},
{q:"الصيام فرض على كل مسلم بالغ عاقل.",a:true},
{q:"القيء عمداً يفطر الصائم.",a:true},
{q:"يجوز الإفطار للمريض إذا شق عليه الصوم.",a:true},
{q:"التفكير في الطعام يبطل الصيام.",a:false},
{q:"من لم يبيت النية قبل الفجر فلا صيام له في الفرض.",a:true},
{q:"السب والشتم لا يؤثران في الصيام.",a:false},
{q:"الدعاء في رمضان له فضل عظيم.",a:true},
{q:"الصدقة في رمضان مضاعفة الأجر.",a:true},
{q:"يجوز للصائم استعمال السواك.",a:true},
{q:"من جامع في نهار رمضان فعليه كفارة.",a:true},
{q:"صلاة التراويح فرض.",a:false},
{q:"صيام رمضان ركن من أركان الإسلام.",a:true},
{q:"يجوز التبرع بالدم للصائم دون أن يفطر إذا لم يضعف.",a:true},
{q:"النية شرط لصحة الصيام.",a:true},
{q:"من أكل شاكاً في الفجر فصيامه صحيح.",a:true},
{q:"الاعتكاف يكون في رمضان.",a:true}
];
function newQuestion(){
let r=questions[Math.floor(Math.random()*questions.length)];
window.currentAnswer=r.a;
document.getElementById("question").innerText=r.q;
document.getElementById("result").innerText="";
}
function answer(choice){
document.getElementById("result").innerText=
choice===window.currentAnswer?"إجابة صحيحة ✅":"إجابة خاطئة ❌";
}
</script>

</body>
</html>
